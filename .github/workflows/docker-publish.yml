name: Publish multi-arch Docker image

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      overpass_version:
        description: 'Version number to build (e.g. 0.7.62)'
        required: true
        type: string
  workflow_call:
    inputs:
      overpass_version:
        description: 'Version number to build (e.g. 0.7.62)'
        required: true
        type: string
    secrets:
      DOCKERHUB_TOKEN:
        required: true

permissions:
  contents: read

jobs:
  build:
    uses: docker/github-builder/.github/workflows/build.yml@7d2a02426d4b989616ba5aaee4e879afd4134b0d # v1.6.0
    permissions:
      contents: read
      id-token: write
    with:
      output: image
      push: true
      platforms: linux/amd64,linux/arm64
      build-args: OVERPASS_VERSION=${{ github.event.release.tag_name || inputs.overpass_version }}
      cache: true
      cache-mode: max
      meta-images: ${{ vars.DOCKERHUB_USERNAME }}/overpass-api
      meta-tags: type=raw,value=${{ github.event.release.tag_name || inputs.overpass_version }}
    secrets:
      registry-auths: |
        - registry: docker.io
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
